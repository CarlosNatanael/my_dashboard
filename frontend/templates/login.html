{% extends "base.html" %}

{% block title %}Acesso Restrito - Dev Dashboard{% endblock %}

{% block content %}
<div class="row justify-content-center" style="min-height: 60vh; align-items: center;">
    <div class="col-md-4">
        <div class="glass-panel p-4 text-center">
            <h3 class="mb-4 text-white">Área do Desenvolvedor</h3>
            
            <form method="POST">
                <div class="mb-3 text-start">
                    <label class="form-label text-info">Usuário</label>
                    <input type="text" name="username" class="form-control bg-dark text-white border-secondary" required autofocus>
                </div>
                
                <div class="mb-4 text-start">
                    <label class="form-label text-info">Senha</label>
                    <input type="password" name="password" class="form-control bg-dark text-white border-secondary" required>
                </div>

                <button type="submit" class="btn btn-info w-100 fw-bold">Entrar no Sistema</button>
            </form>
            
            <div class="mt-3">
                <a href="{{ url_for('index') }}" class="text-muted small text-decoration-none">Voltar ao site público</a>
            </div>
        </div>
    </div>
</div>
{% endblock %}

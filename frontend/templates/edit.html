{% extends "base.html" %}

{% block title %}Editar - {{ claim.title }}{% endblock %}

{% block content %}
<div class="block">
    <div class="block-title">
        <i class="fas fa-edit"></i> Editando: {{ claim.title }}
    </div>
    
    <div style="display: flex; gap: 20px; margin-bottom: 20px; align-items: flex-start;">
        {% if claim.image_icon %}
        <div style="border: 2px solid var(--accent-gold); padding: 2px; background: black;">
            <img src="https://media.retroachievements.org/Images/{{ claim.image_icon }}.png" 
                 style="max-width: 120px; display: block;">
        </div>
        {% endif %}
        
        <div style="flex-grow: 1;">
            <h3 style="color: var(--text-light); font-family: var(--font-heading);">{{ claim.title }}</h3>
            <div style="display: flex; align-items: center; gap: 10px; margin-top: 5px;">
                {% if claim.console_icon %}
                    <img src="{{ claim.console_icon }}" width="24">
                {% endif %}
                <span style="color: var(--accent-teal); font-family: var(--font-retro);">{{ claim.console }}</span>
            </div>
            
            <form method="POST" onsubmit="return confirm('Tem certeza que quer apagar este projeto?');" style="margin-top: 15px;">
                <button type="submit" name="delete" value="true" class="btn btn-danger">
                    <i class="fas fa-trash"></i> Deletar Projeto
                </button>
            </form>
        </div>
    </div>

    <hr style="border: 0; border-top: 1px dashed var(--border-color); margin: 20px 0;">

    <form method="POST">
        <div style="margin-bottom: 20px;">
            <label class="form-label" style="color: var(--accent-gold);">Status do Roteiro</label>
            <select class="form-control" name="status" style="font-size: 14px;">
                <optgroup label="0. Futuro">
                    <option value="wishlist" {% if claim.status == 'wishlist' %}selected{% endif %}>Lista de Desejos</option>
                </optgroup>
                <optgroup label="2. Mão na Massa">
                    <option value="claim" {% if claim.status == 'claim' %}selected{% endif %}>Claim Ativa</option>
                    <option value="ram" {% if claim.status == 'ram' %}selected{% endif %}>Cavando RAM</option>
                    <option value="logic" {% if claim.status == 'logic' %}selected{% endif %}>Codando Lógica</option>
                </optgroup>
                <optgroup label="6. Publicação">
                    <option value="published" {% if claim.status == 'published' %}selected{% endif %}>Publicado</option>
                </optgroup>
                </select>
        </div>

        <div style="margin-bottom: 20px;">
            <label class="form-label">Título Personalizado</label>
            <input type="text" class="form-control" name="title" value="{{ claim.title }}">
        </div>

        <div style="margin-bottom: 20px;">
            <label class="form-label">
                Progresso: <span id="valBox" style="color: var(--accent-pink); font-weight: bold;">{{ claim.progress }}</span>%
            </label>
            <input type="range" style="width: 100%;" name="progress" min="0" max="100" value="{{ claim.progress }}" 
                   oninput="document.getElementById('valBox').innerText = this.value">
        </div>

        <div style="margin-bottom: 20px;">
            <label class="form-label">Caderno de Notas</label>
            <textarea class="form-control" name="notes" rows="8" 
                      style="font-family: 'Courier New', monospace; background: #1a1125; color: lime;"
                      placeholder="0x0012ab: Vida do Boss...">{{ claim.notes }}</textarea>
        </div>

        <div style="display: flex; gap: 10px;">
            <button type="submit" class="btn btn-success" style="flex: 2;">
                <i class="fas fa-save"></i> Salvar Atualização
            </button>
            <a href="{{ url_for('admin_dashboard') }}" class="btn" style="flex: 1;">Voltar</a>
        </div>
    </form>
</div>
{% endblock %}

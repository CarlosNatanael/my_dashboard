{% extends "base.html" %}

{% block title %}Novo Jogo - RA Dashboard{% endblock %}

{% block content %}
<div class="block">
    <div class="block-title">
        <i class="fas fa-plus-circle"></i> Adicionar Novo Projeto
    </div>
    
    <div class="block-content">
        <form method="POST" action="{{ url_for('add_claim') }}">
            
            <div style="margin-bottom: 20px;">
                <label for="ra_id" style="color: var(--accent-gold); font-weight: bold;">ID do RetroAchievements</label>
                <div style="display: flex; gap: 10px;">
                    <span style="background: var(--bg-secondary); padding: 8px; border: 2px inset var(--border-color); display: flex; align-items: center;">#</span>
                    <input type="number" class="form-control" 
                           id="ra_id" name="ra_id" placeholder="Ex: 11252" style="margin: 0;">
                </div>
                <div style="font-size: 11px; color: var(--text-muted); margin-top: 5px;">
                    Digite o ID para buscar automaticamente Capa, Título e Console.
                </div>
            </div>

            <hr style="border: 0; border-top: 1px dashed var(--border-color); margin: 20px 0;">

            <details style="margin-bottom: 20px;">
                <summary style="cursor: pointer; color: var(--accent-teal); font-family: var(--font-retro);">
                    ▶ Preencher manualmente (Caso não tenha ID)
                </summary>
                <div style="padding: 10px; border-left: 2px solid var(--accent-teal); margin-top: 10px;">
                    <div style="margin-bottom: 15px;">
                        <label for="title">Título</label>
                        <input type="text" class="form-control" id="title" name="title">
                    </div>
                    <div>
                        <label for="console">Console</label>
                        <input type="text" class="form-control" id="console" name="console">
                    </div>
                </div>
            </details>

            <div style="margin-bottom: 20px;">
                <label for="status" style="color: var(--accent-gold); font-weight: bold;">Status Inicial</label>
                <select class="form-control" name="status">
                    <optgroup label="Planejamento">
                        <option value="wishlist">Lista de Desejos</option>
                        <option value="jr_plan_review">Pedir Revisão do Plano</option>
                    </optgroup>
                    <optgroup label="Início Rápido">
                        <option value="claim" selected>Claim Ativa</option>
                        <option value="ram">Cavando RAM</option>
                    </optgroup>
                </select>
            </div>

            <button type="submit" class="btn btn-success" style="width: 100%; padding: 10px;">
                <i class="fas fa-save"></i> Buscar e Salvar
            </button>
        </form>
    </div>
</div>
{% endblock %}

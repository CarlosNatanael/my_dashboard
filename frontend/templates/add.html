{% extends "base.html" %}

{% block title %}Novo Projeto - RA Dashboard{% endblock %}

{% block content %}
<div class="row justify-content-center">
    <div class="col-md-8">
        <div class="card bg-secondary text-light">
            <div class="card-header">
                <h4>Adicionar Novo Jogo</h4>
            </div>
            <div class="card-body">
                <form method="POST" action="{{ url_for('add_claim') }}">
                    
                    <div class="mb-3">
                        <label for="ra_id" class="form-label">ID do RetroAchievements (Opcional)</label>
                        <input type="number" class="form-control" id="ra_id" name="ra_id" placeholder="Ex: 14402 (ID do Castlevania SotN)">
                        <div class="form-text text-light opacity-75">Se preencher isso, tentaremos buscar a capa e nome automaticamente.</div>
                    </div>

                    <div class="row">
                        <div class="col-md-6 mb-3">
                            <label for="title" class="form-label">Título do Jogo</label>
                            <input type="text" class="form-control" id="title" name="title" placeholder="Caso não use o ID">
                        </div>
                        <div class="col-md-6 mb-3">
                            <label for="console" class="form-label">Console</label>
                            <input type="text" class="form-control" id="console" name="console" placeholder="Ex: PS1, SNES">
                        </div>
                    </div>

                    <div class="mb-3">
                        <label for="status" class="form-label">Status Inicial</label>
                        <select class="form-select" name="status">
                            <option value="backlog">Ideia / Backlog</option>
                            <option value="ram_digging">Cavando RAM (Digging)</option>
                            <option value="coding">Codando Lógica</option>
                            <option value="badge">Criando Badges</option>
                        </select>
                    </div>

                    <button type="submit" class="btn btn-primary w-100">Salvar Projeto</button>
                </form>
            </div>
        </div>
    </div>
</div>
{% endblock %}
